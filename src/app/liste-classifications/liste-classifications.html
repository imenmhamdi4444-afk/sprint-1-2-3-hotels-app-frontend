<div class="container">
    <div class="card shadow mb-4">
        <div class="card-body">

            <div class="col-sm-4 col-md-4 col-lg-4 mb-4"> 
                <app-update-classification  
                                    [classification]="updatedClassification"  
                                    (classificationUpdated)="classificationUpdated($event)"
                                    [ajout]="ajout" >
                </app-update-classification>                    
               
          </div>
            <table class="table table-striped">
                <thead>
                    <tr> <th>Id</th><th>Nom Classification</th> </tr>
                </thead>
             
             @for(classification of classifications; track classification.idClass)
               {
                <tbody >
                    <tr>
                        <td>{{classification.idClass}}</td>
                        <td>{{classification.nomClass}}</td>
                        <td><a class="btn btn-success"  (click)="updateClassification(classification)">Editer</a></td>
                     </tr>
                </tbody>
               }
            </table>
        </div>
    </div>
</div>
