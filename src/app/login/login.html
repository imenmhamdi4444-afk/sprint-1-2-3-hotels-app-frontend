<div class="container mt-5">
<div class="row justify-content-md-center">
<div class="col-md-4">
    @if(erreur==1) {
    <div class="alert alert-danger" >
    <strong>{{message}}</strong>
    </div>
    }
    <form >
    <div class="form-group mb-3">
    <label >Nom Utilisateur :</label>
    <input type="text" name="username"
    class="form-control"
    [(ngModel)]="user.username" >
    </div>
    <div class="form-group mb-3">
    <label >Mot de passe :</label>
    <input type="password" name="password"
    [(ngModel)]="user.password" class="form-control">
    </div>
    <div class="row justify-content-md-center mb-3">
    <button type="button" (click)="onLoggedin()"
    class="btn mt-3" style="padding: 0.375rem 1.5rem; font-size: 0.9rem; width: auto; background-color: #8d1b54; color: white; border: none;">Connexion</button>
    </div>
    <p class="text-center">Vous n'avez pas de compte ? <a routerLink="/register">S'inscrire</a></p>
    </form>
</div>
</div>
</div>
